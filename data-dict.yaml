tables:
  country:
    description: >
      Lookup table mapping ISO 3166-1 alpha-3 country codes to country
      names, World Bank region, and income group. Sourced from the World
      Bank API.
    source:
      parquet: country.parquet
    columns:
      - name: iso3_code
        type: string
        constraints: [primary_key, required]
        description: ISO 3166-1 alpha-3 country code.
        examples: [AFG, DOM, LBN, PSE, ZWE]
      - name: country_name
        type: string
        constraints: [required, unique]
        description: Country or territory name as used by the World Bank.
        examples: [Afghanistan, Dominica, Libya, Rwanda, Zimbabwe]
      - name: region
        type: string
        constraints: [required]
        description: World Bank geographic region.
        examples: [Sub-Saharan Africa, Latin America & Caribbean, East Asia & Pacific]
      - name: income_group
        type: string
        constraints: [required]
        description: World Bank income classification.
        examples: [Low income, Lower middle income, Upper middle income, High income]

  country_year:
    description: >
      Annual population and GDP by country, 2000–2023. Sourced from the
      World Bank API (indicators SP.POP.TOTL and NY.GDP.MKTP.CD).
    source:
      parquet: country-year.parquet
    columns:
      - name: iso3_code
        type: string
        constraints: [required, foreign_key]
        description: ISO 3166-1 alpha-3 country code.
        examples: [AFG, DOM, LBN, PSE, ZWE]
      - name: year
        type: number(ordinal)
        constraints: [required]
        description: Year of observation.
        range: [2000, 2023]
      - name: population
        type: number(quantity)
        description: Total population.
      - name: gdp_usd
        type: number(quantity)
        description: GDP in current US dollars.

  health_spending:
    description: >
      Aggregate health spending and its breakdown by funding source (domestic
      government, domestic private, and external aid) for 195 countries and
      territories. Each row is one country-expenditure type-year
      observation. Data covers 2000–2023 from the WHO Global Health Expenditure
      Database (GHED).
    source:
      parquet: health_spending.parquet
    columns:
      - name: iso3_code
        type: string
        constraints: [required, foreign_key]
        description: ISO 3166-1 alpha-3 country code.
        examples: [AFG, DOM, LBN, PSE, ZWE]
      - name: year
        type: number(ordinal)
        constraints: [required]
        description: Year of observation.
        range: [2000, 2023]
      - name: expenditure_type
        type: enum
        constraints: [required]
        description: Type of health expenditure.
        values:
          che: Current health expenditure (total).
          gghed: Domestic general government health expenditure (GGHE-D).
          pvtd: Domestic private health expenditure (PVT-D).
          ext: External health expenditure (EXT).
      - name: usd2023
        type: number(quantity)
        constraints: [required]
        description: Spending in constant 2023 US dollars.
        range: [0, 4627736000000]
      - name: che
        type: number(quantity)
        description: >
          Spending as a percentage of current health expenditure. NA for the
          che expenditure type (total CHE cannot be expressed as a percentage
          of itself).
        range: [0, 99.88]

  financing_schemes:
    description: >
      Health spending broken down by financing scheme for 195 countries and
      territories. Each row is one country-financing scheme-year
      observation. Data covers 2000–2023 from the WHO Global Health Expenditure
      Database (GHED).
    source:
      parquet: financing_schemes.parquet
    columns:
      - name: iso3_code
        type: string
        constraints: [required, foreign_key]
        description: ISO 3166-1 alpha-3 country code.
        examples: [AFG, DOM, LBN, PSE, ZWE]
      - name: year
        type: number(ordinal)
        constraints: [required]
        description: Year of observation.
        range: [2000, 2023]
      - name: financing_scheme
        type: enum
        constraints: [required]
        description: Health care financing scheme.
        values:
          hf1: Government schemes and compulsory contributory health care financing schemes.
          hf2: Voluntary health care payment schemes.
          hf3: Household out-of-pocket payments (OOPS).
          hf4: Rest of the world financing schemes (non-resident).
          hfnec: Unspecified financing schemes (n.e.c.).
      - name: usd2023
        type: number(quantity)
        constraints: [required]
        description: Spending in constant 2023 US dollars.
        range: [0, 3874635000000]
      - name: che
        type: number(quantity)
        constraints: [required]
        description: Spending as a percentage of current health expenditure.
        range: [0, 99.90]

  spending_purpose:
    description: >
      Health spending broken down by health care function (purpose) for 142
      countries and territories. Each row is one country-spending purpose-year
      observation. Data covers 2016–2023 from the WHO Global Health Expenditure
      Database (GHED).
    source:
      parquet: spending_purpose.parquet
    columns:
      - name: iso3_code
        type: string
        constraints: [required, foreign_key]
        description: ISO 3166-1 alpha-3 country code.
        examples: [AFG, DOM, LBN, PSE, ZWE]
      - name: year
        type: number(ordinal)
        constraints: [required]
        description: Year of observation.
        range: [2016, 2023]
      - name: spending_purpose
        type: enum
        constraints: [required]
        description: Health care function or purpose of spending.
        values:
          hc1: Curative care.
          hc2: Rehabilitative care.
          hc3: Long-term care (health).
          hc4: Ancillary services.
          hc5: Medical goods.
          hc6: Preventive care.
          hc7: Governance and health system administration.
          hc9: Other health care services (n.e.c.).
      - name: usd2023
        type: number(quantity)
        constraints: [required]
        description: Spending in constant 2023 US dollars.
        range: [0, 3092942000000]
      - name: che
        type: number(quantity)
        constraints: [required]
        description: Spending as a percentage of current health expenditure.
        range: [0, 86.68]

relationships:
  - description: Each health_spending row belongs to one country.
    cardinality: many-to-one
    join: health_spending.iso3_code = country.iso3_code

  - description: Each financing_schemes row belongs to one country.
    cardinality: many-to-one
    join: financing_schemes.iso3_code = country.iso3_code

  - description: Each spending_purpose row belongs to one country.
    cardinality: many-to-one
    join: spending_purpose.iso3_code = country.iso3_code

  - description: Each country_year row belongs to one country.
    cardinality: many-to-one
    join: country_year.iso3_code = country.iso3_code


glossary:
  CHE: >
    Current Health Expenditure. The total spending on health care in a country,
    including government, private, and external sources. Used as the denominator
    when indicators are expressed as percentages.
  GGHE-D: >
    Domestic General Government Health Expenditure. Government spending on
    health from domestic revenue sources (excludes external aid channelled
    through government).
  PVT-D: >
    Domestic Private Health Expenditure. Private spending on health, including
    voluntary insurance, out-of-pocket payments, and other private financing.
  EXT: >
    External Health Expenditure. Health spending from foreign sources such as
    bilateral aid, multilateral organisations, and NGOs.
  OOPS: >
    Out-of-Pocket Spending. Direct payments by households for health services
    at the point of use, not covered by insurance or government programmes.
  GHED: >
    Global Health Expenditure Database. The WHO database that is the source of
    all data in these tables.
  n.e.c.: >
    Not elsewhere classified. A residual category for values that do not fit
    into any of the defined categories.
  constant 2023 US$: >
    US dollars adjusted for inflation to 2023 price levels, allowing
    comparison of monetary values across years.
